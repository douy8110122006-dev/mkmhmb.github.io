<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Render Kiến Trúc</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Công Cụ AI Render Hình Ảnh</h1>
        <p>Nhập mô tả ý tưởng của bạn để AI tạo ảnh.</p>
        
        <div class="input-group">
            <textarea id="promptInput" rows="4" placeholder="Nhập mô tả hình ảnh...">Mặt tiền nhà phố 3 tầng hiện đại, kích thước 4.7m x 20m, thiết kế tối giản với cửa kính lớn, ánh sáng ban ngày chân thực, render kiến trúc siêu thực, 8k, vray.</textarea>
            <button id="generateBtn">Tạo Ảnh Ngay</button>
        </div>

        <div class="result-section">
            <div id="loading" class="hidden">Đang kết xuất hình ảnh, vui lòng đợi...</div>
            <img id="resultImage" src="" alt="Kết quả render sẽ hiển thị ở đây" class="hidden">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
